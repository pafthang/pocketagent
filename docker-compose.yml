services:
  nats:
    build: ./services/nats-server
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data

  pocketbase:
    build: ./services/pocketbase-server
    ports:
      - "8090:8090"
    volumes:
      - pocketbase_data:/pb_data

  api-gateway:
    build: ./services/api-gateway
    depends_on:
      - nats
      - pocketbase
    ports:
      - "8080:8080"

  execution-service:
    build: ./services/execution-service
    depends_on:
      - nats

  task-orchestrator:
    build: ./services/task-orchestrator
    depends_on:
      - nats

volumes:
  nats_data:
  pocketbase_data:
